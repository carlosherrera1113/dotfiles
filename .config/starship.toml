"$schema" = 'https://starship.rs/config-schema.json'

# Tokyo Night-style monochrome prompt: the ░▒▓ ramp fades the line in from the
# terminal background, then the powerline blocks fade light -> dark to the right.
# All segments/symbols kept; only color removed.
format = """
[░▒▓](fg:seg1)\
$os\
$username\
[](fg:seg1 bg:seg2)\
$directory\
[](fg:seg2 bg:seg3)\
$git_branch\
$git_status\
[](fg:seg3 bg:seg4)\
$c\
$dotnet\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$elixir\
$elm\
$gradle\
$julia\
$nim\
$scala\
[](fg:seg4 bg:seg5)\
$docker_context\
[](fg:seg5)\
$line_break$character"""

# Sets the monochrome fade palette.
palette = 'mono'

# seg1 (lightest) -> seg5 (darkest); ink = dark text, paper = light text.
[palettes.mono]
seg1 = '#c5cad3'
seg2 = '#3f4451'
seg3 = '#3a3f4a'
seg4 = '#353945'
seg5 = '#2f343d'
ink = '#21252b'
paper = '#d7dae0'
paper_dim = '#abb2bf'
# Neovim-logo accents (alpha.lua): blue -> cyan -> teal -> aqua
ac_os = '#15315e'
ac_dir = '#84d6df'
ac_git = '#68c5a8'
ac_lang = '#b4e4d6'
ac_docker = '#84ceb8'
ac_cursor = '#6eb8ee'

# Module that displays the current OS.
[os]
disabled = false # Disabled by default
style = "bg:seg1 fg:ac_os"
format = '[ $symbol ]($style)'

# Sets custom symbols for each OS.
[os.symbols]
Alpine = ""
Amazon = ""
Android = "󰀲"
Arch = ""
CentOS = ""
Debian = "󰣚"
EndeavourOS = ""
Fedora = "󰣛"
FreeBSD = "󰣠"
Gentoo = "󰣨"
Illumos = ""
Linux = "󰌽"
Macos = "󰀵"
Manjaro = "󱘊"
Mint = "󰣭"
NixOS = "󱄅"
OpenBSD = ""
openSUSE = ""
Pop = ""
Raspbian = ""
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Redox = "R"
Solus = ""
SUSE = ""
Ubuntu = "󰕈"
Unknown = ""
Windows = "󰍲"

# Module that displays the current username.
[username]
show_always = true
style_user = "bold bg:seg1 fg:ac_os"
style_root = "bold italic bg:seg1 fg:ac_os"
format = '[ $user ]($style)'

# Module that displays the current directory.
[directory]
style = "italic fg:ac_dir bg:seg2"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Sets the custom symbols for directories.
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# Module that displays the current git branch.
[git_branch]
symbol = ""
style = "bg:seg3"
format = '[[ $symbol $branch ](fg:ac_git bg:seg3)]($style)'

# Module that displays the current git status.
[git_status]
style = "bg:seg3"
format = '[[($all_status$ahead_behind )](fg:ac_git bg:seg3)]($style)'

# Language specific modules
[nodejs]
symbol = ""
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[c]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[dotnet]
symbol = "󰪮"
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[rust]
symbol = ""
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[golang]
symbol = ""
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[php]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[java]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[kotlin]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[haskell]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[python]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol( $version) ](fg:ac_lang bg:seg4)]($style)'

[elixir]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

[elm]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

[gradle]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

[julia]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

[nim]
symbol = "󰆥 "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

[scala]
symbol = " "
style = "bg:seg4"
format = '[[ $symbol ($version) ](fg:ac_lang bg:seg4)]($style)'

# Module that displays the docker context.
[docker_context]
symbol = " "
style = "bg:seg5"
format = '[[ $symbol( $context) ](fg:ac_docker bg:seg5)]($style)'

# New line character
[character]
success_symbol = '[󰅂](bold fg:ac_cursor)'
error_symbol = '[](bold fg:seg2)'
vimcmd_symbol = '[󰅁](bold fg:ac_cursor)'
vimcmd_replace_one_symbol = '[󰅁](bold fg:paper_dim)'
vimcmd_replace_symbol = '[󰅁](bold fg:paper_dim)'
vimcmd_visual_symbol = '[󰅁](bold fg:paper_dim)'
