# Enable True Color support (24-bit colors for Starship)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256color*:Tc"

# Enable cursor escape sequences to pass through (for block cursor support)
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -ga terminal-overrides ',*:*crm@'


# Enable mouse support
set -g mouse on

# Pass through extended keys (Shift+Enter, etc.)
set -g extended-keys on
set -ga terminal-features ",*:extkeys"

# Use Ctrl-a as the tmux prefix instead of the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix
